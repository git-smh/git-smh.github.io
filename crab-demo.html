<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>CRAB demo</title>
    <script src="https://unpkg.com/jspsych"></script>
    <script src="jspsych/crab.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych/css/jspsych.css"/>
  </head>

  <body></body>
  <script>
    const jsPsych = initJsPsych();

    const trial = {
      type: jsPsychCrab,
      dataset: [
        {"id": 0, "text": "Oh, fantastic! Another software update right before my deadline. Just what I needed."},
        {"id": 1, "text": "just finished a 10k run wow feeling great"},
        {"id": 2, "text": "Looking forward to the concert this weekend.", "label": 0},
        {"id": 3, "text": "90 min delay, i love deutsche bahn :)"},
        {"id": 4, "text": "Don't forget your umbrella."},
        {"id": 5, "text": "guys i dont know how it works"},
        {"id": 6, "text": "yeah, because waking up at 5am is exactly how I wanted to spend my weekend."},
        {"id": 7, "text": "The weather is amazing, wanna have brunch on the balcony?"},
        {"id": 8, "text": "Of course I love Mondays and my boss who always makes fun of me! Haha, of course I love my job."},
        {"id": 9, "text": "I just love it when my phone dies mid-call. Best day ever! :D"},
        {"id": 10, "text": "Nah he is ugly as heck"},
        {"id": 11, "text": "Does anybody want to go to the park together?"},
      ],
      labels: ["not ironic", "ironic"],
      guidelines: `Please read and adhere to these guidelines:<br>
      <ol>
        <li>
          <b>Main Label:</b> decide if the text is <b>ironic</b> or <b>not ironic</b>.
          <ul>
            <li><b>ironic:</b> the text says one thing but really means the opposite, or uses sarcasm.</li>
            <li><b>not ironic:</b> the text is straightforward, literal, or sincere.</li>
          </ul>
        </li>
        <li>
          <b>Context:</b> donsider the tone, word choice, and context.
          <ul>
            <li>a joke or exaggeration might be <b>ironic</b>, even if it seems positive.</li>
            <li>literal complaints or factual statements are usually <b>not ironic</b>.</li>
          </ul>
        </li>
      </ol>`,
      owner: "git-smh",
      repo: "git-smh.github.io",
    };

    jsPsych.run([trial]);
  </script>
</html>
